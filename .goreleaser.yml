version: 2

project_name: shed

before:
  hooks:
    - go mod tidy

builds:
  - id: shed
    main: ./cmd/shed
    binary: shed
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 30m

homebrew_casks:
  - name: shed
    binaries: [shed]
    repository:
      owner: AndrewHannigan
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    commit_msg_template: "shed: cask update for {{ .Tag }}"
    homepage: "https://github.com/AndrewHannigan/shed"
    description: "Read-only store of git repos for terminal coding agents"
    caveats: |
      Run this once to set up shed and wire it into your coding agents:

        shed init

      It detects your agents (Claude Code, Cursor, ...) and asks before
      editing any of their config. Interactive and idempotent — safe to re-run.
